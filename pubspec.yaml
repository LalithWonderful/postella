name: postella
description: "Postella — créez des annonces de seconde main à partir de photos."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  go_router: ^14.6.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  image_picker: ^1.1.2
  supabase_flutter: ^2.5.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
